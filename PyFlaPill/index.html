<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Edytor Obrazu – Grzegorz Edition</title>
    <link rel="stylesheet" href="/static/style.css" />
    <script src="/static/script.js" defer></script>
  </head>
  <body>
    <h2>Edytor Obrazu – Grzegorz Edition</h2>

    <div class="wrapper">
      <div class="panel">
        <input type="file" id="fileInput" accept="image/*" />

        <div id="controls">
          <label>Jasność</label>
          <input
            type="range"
            id="brightness"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
          />

          <label>Kontrast</label>
          <input
            type="range"
            id="contrast"
            min="0.5"
            max="3"
            step="0.1"
            value="1"
          />

          <label>Ostrość</label>
          <input
            type="range"
            id="sharpness"
            min="0"
            max="3"
            step="0.1"
            value="1"
          />

          <label>Saturacja</label>
          <input
            type="range"
            id="saturation"
            min="0"
            max="3"
            step="0.1"
            value="1"
          />

          <label>Whitening (biel)</label>
          <input type="range" id="whiten" min="0" max="10" step="1" value="2" />
        </div>
      </div>

      <div class="preview-panel">
        <h3>Podgląd:</h3>
        <img id="preview" />
      </div>
    </div>
  </body>
</html>
