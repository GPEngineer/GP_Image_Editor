<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Edytor Obrazu</title>
    <script src="/static/script.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<h2>Edytor Obrazu – Grzegorz Edition</h2>

<input type="file" id="fileInput" accept="image/*">

<div id="controls">
    <label>Jasność</label>
    <input type="range" id="brightness" min="0.5" max="2" step="0.1" value="1">

    <label>Kontrast</label>
    <input type="range" id="contrast" min="0.5" max="3" step="0.1" value="1">

    <label>Ostrość</label>
    <input type="range" id="sharpness" min="0" max="3" step="0.1" value="1">

    <label>Saturacja</label>
    <input type="range" id="saturation" min="0" max="3" step="0.1" value="1">

    <label>Whitening (biel)</label>
    <input type="range" id="whiten" min="0" max="10" step="1" value="2">
</div>

<h3>Podgląd:</h3>
<img id="preview" style="max-width: 600px; border: 1px solid #ccc;">

</body>
</html>
